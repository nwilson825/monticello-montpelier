{%- assign items = site.data[site.metadata] | where_exp: 'item', 'item.objectid != nil' -%}
{%- assign fields = site.data.config-browse -%}

<script>
/* 1. DATA LOAD - SIMPLIFIED */
var items = [
    {% for i in items %}
    { 
        "title": {{ i.title | strip | jsonify }}, 
        "id": {{ i.objectid | jsonify }}, 
        "link": {{ i.objectid | jsonify }},
        "location": {{ i.location | strip | jsonify }},
        "subject": {{ i.subject | strip | jsonify }},
        "format": {{ i.format | strip | jsonify }},
        "filename": {% if i.filename contains '/' %}"{{ i.filename }}"{% else %}"{{ '/objects/' | relative_url | append: i.filename }}"{% endif %}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
];

/* 2. CARD GENERATOR */
function makeCard(obj) {
    var itemHref = "{{ '/item.html' | relative_url | append: '?id=' }}" + obj.id;
    return '<div class="item col-lg-4 col-md-6 col-sm-12 mb-2">' +
        '<div class="card">' +
            '<a href="' + itemHref + '"><img class="card-img-top" src="' + obj.filename + '" alt="' + obj.title + '"></a>' +
            '<div class="card-body text-center">' +
                '<h3 class="card-title h4"><a href="' + itemHref + '" class="text-dark">' + obj.title + '</a></h3>' +
                '<p class="card-text"><strong>Location:</strong> ' + (obj.location || "N/A") + '<br>' +
                '<strong>Subject:</strong> ' + (obj.subject || "N/A") + '</p>' +
                '<a href="' + itemHref + '" class="btn btn-sm btn-light">View Record</a>' +
            '</div>' +
        '</div>' +
    '</div>';
}

/* 3. FILTER FUNCTION */
function filterItems(arr, q) {
    var browseItemsDiv = document.querySelector("#browseItems");
    var query = q.toUpperCase().replace("LOCATION:", "").replace("SUBJECT:", "").trim();
    var filteredItems = [];

    for (var i = 0; i < arr.length; i++) {
        var loc = (arr[i].location || "").toUpperCase();
        var sub = (arr[i].subject || "").toUpperCase();
        if (query === "" || loc.indexOf(query) !== -1 || sub.indexOf(query) !== -1) {
            filteredItems.push(arr[i]);
        }
    }

    var cards = "";
    for (var j = 0; j < filteredItems.length; j++) { cards += makeCard(filteredItems[j]); }
    browseItemsDiv.innerHTML = cards;
    if(document.querySelector("#numberOf")) {
        document.querySelector("#numberOf").innerHTML = filteredItems.length + " of " + items.length + " items";
    }
}

/* 4. INITIALIZE */
window.addEventListener("load", function() {
    var hash = decodeURIComponent(location.hash.substr(1));
    filterItems(items, hash);
    
    var filterBox = document.querySelector('#filterTextBox');
    if (filterBox) {
        filterBox.value = hash;
        filterBox.addEventListener("keyup", function() { filterItems(items, this.value); });
    }
});

window.addEventListener("hashchange", function() {
    var hash = decodeURIComponent(location.hash.substr(1));
    filterItems(items, hash);
});
</script>
